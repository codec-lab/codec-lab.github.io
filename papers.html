    <h2>Papers</h2>
        <div
            x-data="{
                 papers: [],
                 tag_list: [
                    'Planning / Problem Solving', 'Reinforcement Learning',
                    'Interactive Machine Learning', 'Theory of Mind', 'Language', 
                    'Cooperation', 'Mental Effort / Resource Rationality'
                ],
                active_tags: [
                    'Planning / Problem Solving', 'Reinforcement Learning',
                    'Language', 'Theory of Mind', 'Cooperation', 'Interactive Machine Learning',
                    'Mental Effort / Resource Rationality'
                ],
                styles: {
                    'noselect': {
                        '-webkit-user-select': 'none', /* Safari */
                        '-ms-user-select': 'none', /* IE 10 and IE 11 */
                        'user-select': 'none', /* Standard syntax */
                    },
                    'tag': {
                        'margin-right': '5px',
                        'padding': '5px',
                        'padding-left': '10px',
                        'padding-right': '10px',
                        'border-radius': '10px',
                        'cursor': 'pointer',
                        'font-size': '85%',
                        'background-color': '#3cbaff',
                    },
                    'paper': {
                        'margin-bottom': '20px',
                        'max-height': '500px',
                    },
                    'link': {
                        'margin-right': '4px',
                        'padding': '4px',
                        'padding-left': '8px',
                        'padding-right': '8px',
                        'border-radius': '8px',
                        'cursor': 'pointer',
                        'font-size': '75%',
                        '-webkit-user-select': 'none', /* Safari */
                        '-ms-user-select': 'none', /* IE 10 and IE 11 */
                        'user-select': 'none', /* Standard syntax */
                        'color': 'white',
                        'background-color': 'gray',
                    }
                },
                tag_style: {
                    'Review': {'background-color': '#3cbaff'},
                    'Planning / Problem Solving': {'background-color': '#3cbaff'},
                    'Reinforcement Learning': {'background-color': '#3cbaff'},
                    'Language': {'background-color': '#3cbaff'},
                    'Theory of Mind': {'background-color': '#3cbaff'},
                    'Interactive Machine Learning': {'background-color': '#3cbaff'},
                    'Cooperation': {'background-color': '#3cbaff'}
                },
                to_bibtex: (paper_data) => {
                    let author_list = (paper_data['author'] || []).map((a) => a['family'] + ', ' + a['given']).join(' AND ')
                    let editors_list = (paper_data['editor'] || []).map((a) => a['family'] + ', ' + a['given']).join(' AND ')
                    let entry = {
                        'title': paper_data['title'] || '',
                        'author': author_list,
                        'year': paper_data['year'] || '',
                        'volume': paper_data['volume'] || '',
                        'pages': paper_data['page'] || '',
                        'publisher': paper_data['publisher'] || '',
                        'address': paper_data['publisher-place'] || '',
                    }

                    if (paper_data['type'] === 'article-journal') {
                        entry['journal'] = paper_data['container-title'] || ''
                        return [
                            `@article{${paper_data['id']}`,
                            ...Object.keys(entry).map((k) => k+'={'+entry[k]+'}')
                        ].join(',\n  ') + '\n}'
                    }
                    if (paper_data['type'] === 'paper-conference') {
                        entry['booktitle'] = paper_data['container-title']
                        entry['editor'] = editors_list 
                        return [
                            `@inproceedings{${paper_data['id']}`,
                            ...Object.keys(entry).map((k) => k+'={'+entry[k]+'}')
                        ].join(',\n  ') + '\n}'
                    }
                    if (paper_data['type'] === 'chapter') {
                        entry['booktitle'] = paper_data['container-title']
                        entry['editor'] = editors_list 
                        return [
                            `@incollection{${paper_data['id']}`,
                            ...Object.keys(entry).map((k) => k+'={'+entry[k]+'}')
                        ].join(',\n  ') + '\n}'
                    }
                },
                paper_order: [
                    'ho0000rational',

                    'correa2023task',
                    'peng2023diagnosis',
                    'sumers2023show',

                    'arumugam0000bayesian',
                    'dubey0000aha',
                    'sumers0000reconciling',
                    'allen0000games',
                    
                    'ho2022people',
                    'ho2022planning',
                    'ho2022cognitive',
                    'abel2022express',
                    'arumugam2022rate',
                    'sumers2022talk',

                    'ho2021communication',
                    'abel2021expressivity',
                    'correa2020resource',
                    'sarin2021punishment',
                    'gates2021rational',
                    'sumers2021extending',
                    'sumers2021learning',
                    'cushman2021punishment',
                    'wu2021specialization',

                    'ho2020efficiency',
                    'sumers2020show',
                    'wang2020teaching',

                    'ho2019value',
                    'ho2019people',
                    'ho2019computational',
                    'carroll2019utility',

                    'vazquez2018learning',
                    'ho_effectively_2018',

                    'ho_teaching_2017',
                    'ho2017social',
                    'macglashan2017interactive',

                    'ho2016showing',
                    'ho_feature-based_2016',
                    'kleimanweiner2016coordinate',
                    'ho_teaching_2015',
                ]
            }"
            x-init="
                papers = await (await fetch('./papers.json')).json()
                papers = Object.fromEntries(
                    paper_order.map(key => [
                        key, 
                        {
                            ...papers[key],
                            title: papers[key].title,
                            authors: papers[key].author.map(a => `${a['given']} ${a['family']}`).join(', '),
                            year: 
                                papers[key].hasOwnProperty('issued') ?
                                papers[key]['issued']['date-parts'][0][0] :
                                '',
                            'URL': papers[key].hasOwnProperty('URL') ? papers[key]['URL'] : undefined,
                            'acceptance_note': papers[key].hasOwnProperty('acceptance_note') ? papers[key]['acceptance_note'] : '',
                            'tags': papers[key]['tags'].filter(t => tag_list.includes(t))
                        }
                    ])
                )
                clicktag = (tag) => {
                    active_tags = [tag]
                }
                paper_is_visible = (paper_data) =>
                    (
                        paper_data.hasOwnProperty('tags') && 
                        (
                            (
                                paper_data['tags'].length == 0 &&
                                active_tags.length === tag_list.length
                            ) ||
                            paper_data['tags'].filter(
                                t => tag_list.includes(t)
                            ).some(t => active_tags.includes(t))
                        )
                    )
                download_bibtex_list = () => {
                    const bib_string = Object.keys(papers).map(
                        k => to_bibtex(papers[k])
                    ).join('\n\n')
                    const dataURI = 'data:text/plain;charset=utf-8,' + encodeURIComponent(bib_string);
                    const anchor = document.createElement('a');
                    anchor.href = dataURI;
                    anchor.download = 'references.bib';
                    anchor.style.display = 'none';
                    document.body.appendChild(anchor);
                    anchor.click();
                    document.body.removeChild(anchor);
                }
            "
            style="min-height: 70vh;"
        >
        <div style="margin-bottom: 20px;">
            <div style="max-width: 90%">
            <span 
                :style="{
                    ...styles.tag,
                    ...styles.noselect,
                    ...(
                        active_tags.length === tag_list.length ? 
                        {'background-color': 'black'} :
                        {'background-color': 'gainsboro'}
                    ),
                    color: 'white'
                }"
                x-on:click="
                    if (active_tags.length !== tag_list.length) {
                        active_tags = tag_list
                    }
                "
            >
                All Topics
            </span>
            <template x-for="tag in tag_list">
                <span
                    :style="{
                        ...styles.tag,
                        ...styles.noselect,
                        ...(active_tags.includes(tag) ? {} : {'background-color': 'gainsboro'})
                    }"
                    x-on:click="clicktag(tag)"
                >
                    <span x-text="tag.replace(/\s/g, '&nbsp;')"></span>
            </span>
            </template>
            </div>
            <div style="text-align: right;">
                <span 
                    :style="styles['link']"
                    x-on:click="download_bibtex_list()"
                >
                Download as .bib file 
                </span>
            </div>
        </div>
        <ol>
            <template x-for="(paper_data, key) in papers">
              <li 
                x-bind:id="key"
                :style="
                    (
                        paper_is_visible(paper_data) ? 
                        {
                            ...styles['paper'],
                            transitionProperty: 'max-height, opacity, margin-bottom, visibility',
                            transitionDuration: '0.4s, 0.5s, 0.4s, 0.5s',
                            transitionTimingFunction: 'ease',
                            transitionDelay: '0s, 0.2s, 0s, 0.2s',
                        } :
                        {
                            'max-height': '0px',
                            opacity:'0',
                            'visibility': 'hidden',
                            transitionProperty: 'max-height, opacity, margin-bottom, visibility',
                            transitionDuration: '0.4s, 0.4s, 0.4s, 0.4s',
                            transitionTimingFunction: 'ease',
                            transitionDelay: '.2s, 0s, .2s, 0s',
                        }
                    )
                "
              >
                <a 
                    x-bind:href="paper_data['URL']" 
                    target="_blank" 
                    style="color: black; cursor: pointer;" 
                >
                    <b>
                        <span x-text="paper_data['title']"></span>
                    </b>
                    <div>
                        <span x-text="paper_data['authors']"></span>
                    </div>
                    <div>
                        <i><span x-text="paper_data['container-title']"></span></i>
                        <span>(<span x-text="paper_data['year']"></span>)</span>
                    </div>
                </a>
                <div>
                    <b><span x-text="paper_data['acceptance_note']" style="color:rgb(197, 0, 0)"></span></b>
                </div>
                <template x-for="tag in paper_data['tags']">
                    <span 
                        x-show="tag_list.includes(tag)" 
                        x-text="tag" 
                        x-on:click="
                            clicktag(tag);
                            this_paper = document.getElementById(paper_data['id']);
                            setTimeout(() => this_paper.scrollIntoView({
                                behavior: 'smooth',
                                block: 'start',
                            }), 800);
                        "
                        :style="{
                            ...styles['tag'],
                            ...styles['noselect'],
                            ...(active_tags.includes(tag) ? {} : {'background-color': 'gainsboro'})
                        }"
                    ></span> 
                </template>
                <div>
                <template x-for="(url, name) in paper_data['links']">
                    <span :style="styles['link']">
                        <a x-bind:href="url" x-text="name" target="_blank" style="color: white"></a>
                    </span>
                </template>
                    <span 
                        :style="styles['link']"
                        x-on:click="
                            (e) => {
                                bibtex = document.getElementById(paper_data['id']+'_bibtex')
                                bibtex.style.display = bibtex.style.display === 'block' ? 'none' : 'block'
                            }
                        "
                    >
                    BibTex
                    </span>
                    <div
                        x-bind:id="paper_data['id']+'_bibtex'" 
                        style="display:none" 
                    >
                        <pre 
                            x-text="to_bibtex(paper_data)"
                        >
                        </pre>
                    </div>
                </div>
              </li>
            </template>
        </ol>
    </div>
