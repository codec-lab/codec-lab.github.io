<!DOCTYPE html>
<html>
<head>
  <title>Simple Webpage</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/yegor256/tacit@gh-pages/tacit-css-1.5.5.min.css"/>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="https://cdn.jsdelivr.net/pyodide/v0.23.2/full/pyodide.js"></script>
</head>
<body>
  <section>
    <header>
            <nav style="display: flex; align-items: center; text-align: center; justify-content: center;">
            <span x-data x-html="await (await fetch('necker.html')).text()"></span>
            <span style="vertical-align: top; text-align: left; font-size: 150%; padding-left: .5%;">
                <b>Computation and<br>Decision-Making<br>Lab</b>
            </span>
        </nav>
    <nav>
        <ul>
            <li><a href="#about">About</a></li>
            <li><a href="#people">People</a></li>
            <li><a href="#papers">Papers</a></li>
            <li><a href="#links">Links</a></li>
        </ul>
    </nav>
    </header>
  </section>
  <article>
  <section id="about" x-data x-html="await (await fetch('about.html')).text()"></section>
  <section id="people" x-data x-html="await (await fetch('people.html')).text()"></section>
  <section id="papers" x-data x-html="await (await fetch('papers.html')).text()"></section>
  <section id="links">
    <h2>Links</h2>
    <p>This is the links section of the webpage.</p>
  </section>
</article>
</body>
</html>
